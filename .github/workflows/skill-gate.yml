# Skill gate — CI-gated skill governance, the reference implementation.
#
# Every PR touching the skill catalog (or the gate itself) must pass:
#   1. admit  (SG-1/3/4/6/7/9): scan every skill with Skillspector (+ optional LLM
#      rubric judge) and adjudicate against the OSCAL profile. Denials — or
#      interrupts pending human approval — fail the build. The full OSCAL
#      assessment-results document is uploaded as the build artifact: the PR's
#      compliance evidence.
#   2. verify (SG-2): recompute every skill digest against the committed
#      skills.lock.json. Changing or adding a skill without regenerating the lock
#      in the same PR fails — the lockfile update IS the review signal.
#
# Regenerate the lock after intentional skill changes:
#   PYTHONPATH=src python3 -m deepagent_skill_guardrails.cli admit \
#     --skills examples/skills \
#     --oscal-profile data/oscal-policies/skills-policy-profile.json \
#     --scanner-cmd 'node scripts/scan_skill.mjs' \
#     --lock-out skills.lock.json
#
# Semantic stream in CI: set repo variables SKILL_JUDGE_URL + SKILL_JUDGE_MODEL
# (OpenAI-compatible endpoint) and secret SKILL_JUDGE_API_KEY. Without them the
# gate runs static-only — and any policy with require_rubric will fail closed,
# which is the correct behavior.

name: skill-gate

# No `paths:` filter, deliberately: both jobs are branch-protection required checks,
# and a path-filtered required check never reports on unrelated PRs — blocking their
# merge forever. The full gate costs ~25s; run it on every PR and push to main.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skill-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  admit:
    name: "admission gate (SG-1/3/4/6/7/9)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The Skillspector engine is a sibling repo (gitignored here as references/).
      # Pin `ref:` to a tag/SHA once skillspector-trial cuts a release.
      - name: Checkout Skillspector engine
        uses: actions/checkout@v4
        with:
          repository: sw30labs/skillspector-trial
          path: .skillspector

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install gate
        run: pip install -e .

      - name: Run admission gate
        env:
          SKILLSPECTOR_ENGINE: ${{ github.workspace }}/.skillspector/src/engine.js
          JUDGE_URL: ${{ vars.SKILL_JUDGE_URL }}
          JUDGE_MODEL: ${{ vars.SKILL_JUDGE_MODEL }}
          SKILL_JUDGE_API_KEY: ${{ secrets.SKILL_JUDGE_API_KEY }}
        run: |
          set -o pipefail
          mkdir -p out
          JUDGE_ARGS=""
          if [ -n "$JUDGE_URL" ] && [ -n "$JUDGE_MODEL" ]; then
            JUDGE_ARGS="--rubric-judge-url $JUDGE_URL --rubric-judge-model $JUDGE_MODEL"
            echo "semantic stream: $JUDGE_MODEL @ $JUDGE_URL"
          else
            echo "semantic stream: no judge endpoint configured (repo vars SKILL_JUDGE_URL / SKILL_JUDGE_MODEL) — static analysis only"
          fi
          # CI adjudicates as the `supervisor` persona: the curator whose allowlist
          # spans the shared catalog. Per-agent visibility (e.g. coding-agent not
          # seeing oscal-authoring) is runtime least-exposure, not a CI failure.
          # --fail-on interrupt: anything needing human approval blocks the PR
          # until it lands with an explicit --approve (recorded governance).
          PYTHONPATH=src python -m deepagent_skill_guardrails.cli admit \
            --skills examples/skills \
            --oscal-profile data/oscal-policies/skills-policy-profile.json \
            --agent supervisor \
            --scanner-cmd 'node scripts/scan_skill.mjs' \
            --fail-on interrupt \
            --results out/assessment-results.json \
            $JUDGE_ARGS | tee out/admit-table.txt

      - name: Decision table → job summary
        if: always()
        run: |
          {
            echo "## Skill admission decisions"
            echo '```text'
            cat out/admit-table.txt 2>/dev/null || echo "gate crashed before producing a table"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload OSCAL assessment-results (compliance evidence)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assessment-results
          path: |
            out/assessment-results.json
            out/admit-table.txt
          if-no-files-found: warn

  verify:
    name: "integrity gate (SG-2)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install gate
        run: pip install -e .
      - name: Verify digest lock
        run: |
          PYTHONPATH=src python -m deepagent_skill_guardrails.cli verify \
            --lock skills.lock.json \
            --skills-root examples/skills
